name: 检查与部署

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: 检查并构建站点
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: 恢复 OG 字体缓存
        uses: actions/cache@v5
        with:
          path: src/assets/lxgw-wenkai-lite-*.ttf
          key: ${{ runner.os }}-og-fonts-${{ hashFiles('scripts/download-og-fonts.mjs') }}

      - name: 安装依赖
        run: pnpm install

      - name: 下载 OG 字体
        run: pnpm download:og-fonts

      - name: 运行 Astro 检查
        run: pnpm astro check

      - name: 构建站点
        run: pnpm build
        env:
          WEBMENTION_API_KEY: ${{ secrets.WEBMENTION_API_KEY }}
          WEBMENTION_URL: https://webmention.io/blog.zkl2333.com/webmention

      - name: 上传 dist 构建产物
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy-server:
    name: 部署到阿里云服务器（CDN 回源）
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: 配置 SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: rsync 同步到服务器
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete --mkpath --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/" \
            > /dev/null
