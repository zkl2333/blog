name: 持续集成

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: 检查构建与类型问题
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: 安装依赖
        run: pnpm install

        # 使用 astro check 检查类型和配置问题
      - name: 运行 Astro 检查
        run: pnpm astro check

        # 确认生产构建可以正常完成
      - name: 运行 Astro 构建
        run: pnpm build
